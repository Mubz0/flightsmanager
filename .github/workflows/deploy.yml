name: Build and Deploy to Azure

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NODE_ENV: production

      - name: Package standalone build
        run: |
          # Find the standalone server directory (may be nested under a project-name subdir)
          STANDALONE=$(dirname $(find .next/standalone -name "server.js" ! -path "*/node_modules/*" | head -1))
          echo "Standalone dir: $STANDALONE"
          mkdir -p deploy-out
          cp -r "$STANDALONE"/. deploy-out/
          cp -r .next/static deploy-out/.next/static
          cp -r public deploy-out/public
          cd deploy-out && zip -r ../deploy.zip . -x "*.git*"

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure App Service
        run: |
          az webapp deploy \
            --resource-group rg-flightsmanager \
            --name app-flightsmanager \
            --src-path deploy.zip \
            --type zip \
            --async false
